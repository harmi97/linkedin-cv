<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn CV - Sample Outputs</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 2rem; }
        h1 { text-align: center; margin-bottom: 1.5rem; color: #333; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 0; }
        .tab {
            padding: 0.75rem 1.5rem;
            background: #ddd;
            border: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 1rem;
        }
        .tab.active { background: #fff; font-weight: 600; }
        .content {
            background: #fff;
            border-radius: 0 8px 8px 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
            overflow: hidden;
        }
        iframe { width: 100%; height: 80vh; border: none; display: none; }
        iframe.active { display: block; }
    </style>
</head>
<body>
    <h1>LinkedIn CV - Sample Outputs</h1>
    <div class="tabs">
        <button class="tab active" onclick="show('basic')">Basic</button>
    </div>
    <div class="content">
        <iframe id="basic" class="active" src="samples/output/basic.html"></iframe>
    </div>
    <script>
        function show(name) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(name).classList.add('active');
        }
    </script>
</body>
</html>
